name: kiddo_play
description: A kids puzzle game scaffold built with Flutter.
publish_to: none

version: 1.0.1+2

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  flutter_svg: ^2.1.0
  google_fonts: ^6.2.1
  shared_preferences: ^2.5.3
  confetti: ^0.8.0
  intl: ^0.20.2
  audioplayers: ^6.6.0
  path_provider: ^2.1.5
  flutter_tts: ^4.2.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.7

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/images/
    - assets/images/branding/
    - assets/sounds/
    - assets/sounds/animals/
